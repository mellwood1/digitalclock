<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="main.css">
    <title>Digital Clock</title>
</head>
<body>
    <header>
        <h2>Current Time</h2>
    </header>
    <main>
        <div class="container">
            <div class="digitalclock">
                <h3 id="day">MON</h3>
                <h3 id="hour">10</h3>
                <h3 id="c1">: </h3>
                <h3 id="min">30</h3>
                <h3 id="c2">: </h3>
                <h3 id="sec">45</h3>
                <h3 id="ampm">AM</h3>
            </div>
        </div>
    </main>
    <footer>
        <p>&copy; <span id="cyear">Matt Ellwood Productions</span></p>
    </footer>
</body>
</html>
<script src="digitalclock.js"></script>
